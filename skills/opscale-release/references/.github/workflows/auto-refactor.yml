name: Auto Refactor

on:
  pull_request:
    branches:
      - develop

jobs:
  auto-refactor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - uses: actions/cache@v4
        with:
          path: /tmp/rector
          key: ${{ runner.os }}-rector-${{ hashFiles('**/rector.php') }}

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader
        env:
          COMPOSER_AUTH: '{"http-basic": {"nova.laravel.com": {"username": "${{ secrets.NOVA_USERNAME }}", "password": "${{ secrets.NOVA_LICENSE_KEY }}"}}}'

      - name: Rector dry-run
        id: rector-check
        run: |
          if vendor/bin/rector process --dry-run --ansi; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
        env:
          RECTOR_CACHE_DIR: /tmp/rector

      - name: Apply Rector
        if: steps.rector-check.outputs.has_changes == 'true'
        run: vendor/bin/rector process --ansi
        env:
          RECTOR_CACHE_DIR: /tmp/rector

      - name: Comment on PR with diff
        if: steps.rector-check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const diff = execSync('git diff', { encoding: 'utf8' });
            const summary = execSync('git status --short', { encoding: 'utf8' });
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Rector Refactoring Suggestions\n\n\`\`\`bash\n${summary}\`\`\`\n\n<details><summary>Diff</summary>\n\n\`\`\`diff\n${diff.substring(0, 60000)}\n\`\`\`\n</details>\n\nRun \`vendor/bin/rector process\` locally and commit.`
            });

      - name: Fail if changes needed
        if: steps.rector-check.outputs.has_changes == 'true'
        run: |
          echo "❌ Refactoring needed — run 'vendor/bin/rector process' and commit."; exit 1
